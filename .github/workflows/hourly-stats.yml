name: Hourly stats snapshot

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate hourly stats snapshot
        env:
          STATS_SOURCE_URL: ${{ vars.STATS_SOURCE_URL }}
        run: node scripts/scrape-hourly-stats.mjs
      - name: Commit snapshot
        run: |
          if git diff --quiet -- data/hourly-stats.json; then
            echo "No stats changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hourly-stats.json
          git commit -m "Update hourly stats snapshot"
          git push
