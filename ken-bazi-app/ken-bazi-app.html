<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0b10">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ken 命理 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0907;--bg2:#120f0c;--bg3:#1b1510;--bg4:#261b13;--card:linear-gradient(145deg,rgba(35,25,18,.9),rgba(17,13,10,.97));--card-border:rgba(218,164,82,.14);--text:#f6efe4;--text2:#c2b09a;--text3:#96856f;--accent:#d8a74c;--accent2:#9f681f;--gold-soft:rgba(216,167,76,.12);--red:#c65d49;--red-bg:rgba(198,93,73,.12);--green:#c8a15b;--green-bg:rgba(200,161,91,.1);--blue:#b38a64;--blue-bg:rgba(179,138,100,.1);--purple:#9f5c4a;--purple-bg:rgba(159,92,74,.1);--orange:#b8783a;--orange-bg:rgba(184,120,58,.12);--fire:#c65d49;--earth:#d8a74c;--metal:#c7b59b;--water:#8f7359;--wood:#b78d4f;--radius:14px;--radius-sm:10px;--font-display:'Noto Serif TC',serif;--font-body:'Noto Sans TC',sans-serif;color-scheme:dark}
input[type=date]{color-scheme:dark}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:radial-gradient(circle at 50% -10%,rgba(128,69,34,.22),transparent 42%),linear-gradient(180deg,#0b0907 0%,#130d09 48%,#0b0907 100%);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{cursor:pointer}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.score-main,.kpi-value,.cat-score-pro,.cat-score,.hr-sc,.spec-score,.cal-stats .csv,.yr-stats .ysv,.yr-card .yr-avg,.wk-day .wd-sc,.hour-mini-score{font-variant-numeric:tabular-nums}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}#star-canvas{display:none}}
#star-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.app{max-width:480px;margin:0 auto;padding-top:env(safe-area-inset-top,0);padding-bottom:110px;position:relative;z-index:1}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(12,9,7,.94);backdrop-filter:blur(24px) saturate(1.15);-webkit-backdrop-filter:blur(24px) saturate(1.15);border-top:1px solid rgba(216,167,76,.12);display:flex;justify-content:space-around;padding:6px 0 calc(env(safe-area-inset-bottom,8px) + 10px);z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--text3);flex:1;min-width:0;max-width:64px;min-height:46px;padding:6px 2px 3px;cursor:pointer;border:none;background:none;transition:color .25s,text-shadow .25s;position:relative;letter-spacing:.3px;border-radius:10px}
.nb:active{color:var(--text2)}
.nb.active{color:var(--accent);text-shadow:0 0 12px rgba(240,180,41,.3)}.nb.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:2px}
.nb svg{width:19px;height:19px;margin-bottom:3px;transition:all .3s}.nb.active svg{filter:drop-shadow(0 0 4px rgba(240,180,41,.4));transform:translateY(-1px)}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);margin:12px 16px;padding:18px;position:relative;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,231,186,.035)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 8%,rgba(216,167,76,.18) 48%,transparent 92%)}
.card-title{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-title::before{content:'';width:3px;height:11px;border-radius:2px;background:linear-gradient(180deg,var(--accent),var(--accent2));flex-shrink:0;box-shadow:0 0 6px rgba(216,167,76,.35)}
.hdr{padding:22px 16px 6px;display:flex;justify-content:space-between;align-items:flex-end}
.hdr-logo{font-family:var(--font-display);font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent),#ffd566,var(--accent2));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s ease infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hdr-date{font-size:12px;color:var(--text2);font-weight:300}
.sec{display:none;opacity:0;transform:translateY(6px);transition:opacity .35s ease,transform .35s ease}.sec.on{display:block;opacity:1;transform:none}
/* Chat */
.chat-wrap{padding:0 16px}.chat-day{text-align:center;margin:18px 0 10px}
.chat-day span{font-size:10px;color:var(--text3);background:linear-gradient(135deg,rgba(22,25,41,.8),rgba(14,16,25,.9));padding:5px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.04);letter-spacing:1px}
.msg-row{display:flex;gap:10px;margin:12px 0;align-items:flex-start;opacity:0;transform:translateY(8px);transition:all .5s cubic-bezier(.4,0,.2,1)}.msg-row.vis{opacity:1;transform:none}
.msg-row.right{flex-direction:row-reverse}
.avatar{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:var(--font-display);font-weight:900;position:relative}
.avatar::after{content:'';position:absolute;inset:-2px;border-radius:50%;border:1.5px solid transparent;pointer-events:none}
.avatar.xu{background:linear-gradient(135deg,#8b2500,#cc4400);box-shadow:0 0 16px rgba(204,68,0,.25)}.avatar.xu::after{border-color:rgba(204,68,0,.3)}
.avatar.chen{background:linear-gradient(135deg,#5b3026,#9f5c4a);box-shadow:0 0 16px rgba(159,92,74,.22)}.avatar.chen::after{border-color:rgba(216,167,76,.22)}
.msg-body{max-width:74%}.msg-name{font-size:10.5px;color:var(--text3);margin-bottom:4px;font-weight:500;letter-spacing:.5px}.msg-row.right .msg-name{text-align:right}
.bubble{padding:13px 16px;border-radius:16px;font-size:13.5px;line-height:1.8;word-break:break-word;backdrop-filter:blur(8px)}
.msg-row:not(.right) .bubble{background:linear-gradient(135deg,rgba(139,37,0,.1),rgba(139,37,0,.04));border:1px solid rgba(139,37,0,.15);border-top-left-radius:4px}
.msg-row.right .bubble{background:linear-gradient(135deg,rgba(159,92,74,.1),rgba(63,41,27,.08));border:1px solid rgba(159,92,74,.18);border-top-right-radius:4px}
.bubble .quote{font-family:var(--font-display);font-style:italic;color:var(--accent);font-size:12.5px;display:block;margin:8px 0 4px;padding:6px 0 6px 12px;border-left:2px solid rgba(240,180,41,.35);background:rgba(240,180,41,.03);border-radius:0 6px 6px 0}
.bubble em{color:var(--accent);font-style:normal;font-weight:600}.bubble .ref{font-size:11px;color:var(--text3);display:block;margin-top:6px;font-style:italic}
.chat-toggle{text-align:center;margin:8px 0 4px}.chat-toggle-btn{background:rgba(255,255,255,.03);border:1px solid var(--card-border);color:var(--text2);padding:12px 22px;border-radius:20px;font-size:11.5px;cursor:pointer;transition:all .2s;font-family:var(--font-body)}.chat-toggle-btn:active{background:rgba(255,255,255,.06)}
.h-chat-collapsed .msg-row:nth-child(n+5){display:none}
/* Q&A */
.qa-wrap{margin:12px 16px;position:relative}
.qa-input-row{display:flex;gap:8px}
.qa-input{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--card-border);color:var(--text);padding:12px 16px;border-radius:24px;font-size:13px;font-family:var(--font-body);outline:none;transition:border-color .3s}
.qa-input:focus{border-color:rgba(240,180,41,.3)}
.qa-input::placeholder{color:var(--text3)}
.qa-send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#1a1006;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 12px rgba(240,180,41,.25)}.qa-send:active{transform:scale(.9)}.qa-send svg{width:18px;height:18px}
.qa-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.qa-tag{background:rgba(255,255,255,.03);border:1px solid var(--card-border);color:var(--text2);padding:11px 14px;border-radius:20px;font-size:11.5px;cursor:pointer;transition:all .2s;font-family:var(--font-body)}.qa-tag:active{background:rgba(240,180,41,.08);border-color:rgba(240,180,41,.2);color:var(--accent)}
.qa-response{margin-top:12px;display:none}.qa-response.show{display:block}
/* Typing animation */
.typing-dot{display:inline-flex;gap:3px;padding:8px 12px}.typing-dot span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:typingBounce 1.4s infinite}
.typing-dot span:nth-child(2){animation-delay:.2s}.typing-dot span:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
/* Verdict */
.verdict-box{background:linear-gradient(135deg,rgba(216,167,76,.09),rgba(64,35,18,.06));border:1px solid rgba(216,167,76,.18);border-radius:var(--radius);padding:16px 18px;margin:12px 16px;overflow:hidden}
.verdict-box h4{font-size:13px;color:var(--accent);margin-bottom:8px;font-weight:700;font-family:var(--font-display)}
.verdict-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}.verdict-row .vl{color:var(--text2);font-weight:500}
/* Cat bars */
.cat-row{display:flex;align-items:center;margin:10px 0}.cat-icon{width:28px;font-size:15px;text-align:center;flex-shrink:0}.cat-name{width:34px;font-size:12px;font-weight:600;flex-shrink:0}
.cat-track{flex:1;height:5px;background:rgba(255,255,255,.03);border-radius:3px;margin:0 10px;overflow:hidden}.cat-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.cat-score{width:30px;text-align:right;font-size:13px;font-weight:700;font-family:var(--font-display)}
.radar-wrap{display:flex;justify-content:center;padding:10px 0}
/* Hours */
.hr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hr-card{background:rgba(255,255,255,.02);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;cursor:pointer;transition:all .3s}
.hr-card:active{transform:scale(.96)}.hr-card.best{border-color:rgba(240,180,41,.3);background:rgba(240,180,41,.04);animation:pulse-gold 2.5s infinite}.hr-card.worst{border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.02)}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(240,180,41,.15)}50%{box-shadow:0 0 0 8px rgba(240,180,41,0)}}
.hr-hz{font-family:var(--font-display);font-size:18px;font-weight:900}.hr-time{font-size:10px;color:var(--text3);margin:3px 0 8px}.hr-sc{font-size:22px;font-weight:800}
.hr-star{font-size:10px;color:var(--accent);letter-spacing:1px;margin-top:2px}.hr-badge{font-size:9.5px;margin-top:4px;display:inline-block;padding:2px 7px;border-radius:5px}
/* Spec */
.spec-hero{text-align:center;padding:24px 0}.spec-score{font-family:var(--font-display);font-size:56px;font-weight:900}.spec-verdict{font-size:15px;font-weight:600;margin-top:6px}
.spec-stars{font-size:14px;color:var(--accent);letter-spacing:3px;margin-top:4px}
.spec-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px}.spec-row:last-child{border:none}
.strategy{background:rgba(255,255,255,.02);border-radius:var(--radius-sm);padding:16px;font-size:13px;line-height:1.8;margin-top:12px;border:1px solid rgba(255,255,255,.03)}.strategy .warn{color:var(--orange);font-size:12px;margin-top:10px;display:block;padding-top:8px;border-top:1px solid rgba(255,255,255,.03)}
/* Calendar */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.cal-nav h3{font-family:var(--font-display);font-size:17px;font-weight:700}
.cal-btn{background:rgba(255,255,255,.03);border:1px solid var(--card-border);color:var(--text);min-width:44px;height:44px;padding:0 10px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;gap:2px}.cal-btn:active{background:rgba(255,255,255,.06)}.cal-btn.cal-today-btn{font-size:12px;font-weight:700;color:var(--accent);border-color:rgba(216,167,76,.22)}
.cal-wk{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}.cal-wk span{font-size:10px;color:var(--text3);padding:6px 0;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;position:relative;transition:all .2s;background:rgba(255,255,255,.01)}
.cal-cell:active{transform:scale(.9)}.cal-cell.today{border:1.5px solid var(--accent);box-shadow:0 0 12px rgba(216,167,76,.14)}.cal-cell.cmp-sel{border:1.5px solid var(--accent);box-shadow:0 0 12px rgba(216,167,76,.16)}
.cal-cell.empty{pointer-events:none;opacity:0}.cal-cell .cd{font-weight:700;font-size:13px}.cal-cell .cs{font-size:9px;margin-top:1px;font-weight:600}
.cal-cell .cdot{width:4px;height:4px;border-radius:50%;position:absolute;bottom:3px}
.cal-cell .jq-mark{position:absolute;top:2px;right:3px;font-size:8px;color:var(--accent);font-weight:700}
.cal-stats{display:flex;justify-content:space-around;text-align:center;padding:8px 0}
.cal-stats .csv{font-family:var(--font-display);font-size:26px;font-weight:900}.cal-stats .csl{font-size:10px;color:var(--text2);margin-top:3px}
.trend-wrap{height:60px;display:flex;align-items:flex-end;gap:1px;padding:0 2px}
.trend-bar{flex:1;border-radius:2px 2px 0 0;transition:height .6s ease;min-width:2px;cursor:pointer;position:relative}
.trend-bar:hover::after,.trend-bar:active::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--text);font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;border:1px solid var(--card-border);z-index:5}
.compare-bar{display:none;margin:12px 16px;padding:12px 16px;background:linear-gradient(135deg,rgba(216,167,76,.08),rgba(216,167,76,.02));border:1px solid rgba(216,167,76,.15);border-radius:var(--radius-sm);font-size:12px;color:var(--accent);align-items:center;justify-content:space-between}
.compare-bar.on{display:flex}
.compare-bar button{background:var(--blue);color:#000;border:none;padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer}
.compare-bar .cmp-cancel{background:rgba(255,255,255,.06);color:var(--text2);margin-left:6px}
/* Year */
.yr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.yr-card{background:rgba(255,255,255,.02);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:16px 10px;text-align:center;cursor:pointer;transition:all .3s}
.yr-card:active{transform:scale(.96)}.yr-card .yr-mon{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:6px}
.yr-card .yr-avg{font-family:var(--font-display);font-size:26px;font-weight:900}.yr-card .yr-star{font-size:9px;color:var(--accent);letter-spacing:1px;margin-top:3px}
.yr-spark{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:40px;margin-top:8px}
.yr-spark .yr-bar{width:6px;border-radius:3px 3px 0 0;transition:height .8s cubic-bezier(.4,0,.2,1)}
.yr-stats{display:flex;justify-content:space-around;text-align:center;padding:8px 0}
.yr-stats .ysv{font-family:var(--font-display);font-size:26px;font-weight:900}.yr-stats .ysl{font-size:10px;color:var(--text2);margin-top:3px}
/* Week */
.wk-days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;margin-bottom:16px}
.wk-day{text-align:center;padding:12px 2px;min-width:0;overflow:hidden;border-radius:var(--radius-sm);background:rgba(255,255,255,.02);border:1px solid var(--card-border);cursor:pointer;transition:all .3s}
.wk-day:active{transform:scale(.95)}.wk-day.wk-best{border-color:rgba(240,180,41,.3);background:rgba(240,180,41,.04);animation:pulse-gold 2.5s infinite}
.wk-day.wk-today{border-color:var(--accent)}.wk-day .wd-name{font-size:10px;color:var(--text3);font-weight:600}.wk-day .wd-date{font-size:11px;color:var(--text2);margin:3px 0}
.wk-day .wd-sc{font-family:var(--font-display);font-size:20px;font-weight:900}.wk-day .wd-star{font-size:9px;color:var(--accent)}
.wk-rank{margin-top:8px}.wk-rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}.wk-rank-row:last-child{border:none}
.wk-rank-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
/* Cats detail */
.cat-card{margin:12px 16px;cursor:pointer;transition:all .3s}.cat-card:active{transform:scale(.98)}
.cat-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cat-card-title{font-size:16px;font-weight:700}.cat-card-score{font-family:var(--font-display);font-size:30px;font-weight:900}
.cat-advice{font-size:13px;color:var(--text2);line-height:1.8}
/* Natal */
.natal-pillar{display:flex;justify-content:center;gap:8px;margin:16px 0}
.pillar{text-align:center;background:rgba(255,255,255,.02);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:14px 16px;min-width:65px;transition:all .3s}.pillar:active{transform:scale(.95)}
.pillar-label{font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:8px;font-weight:600}
.pillar-g{font-family:var(--font-display);font-size:22px;font-weight:900;margin-bottom:2px}
.pillar-z{font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--text2)}
.elem-tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;margin-top:6px;font-weight:600}
/* Ten Gods */
.tengod-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:12px 0}
.tg-cell{text-align:center;padding:10px 4px;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:rgba(255,255,255,.02);cursor:pointer;transition:all .3s}
.tg-cell:active{transform:scale(.95)}.tg-cell.tg-active{border-color:rgba(240,180,41,.3);background:rgba(240,180,41,.04)}
.tg-name{font-family:var(--font-display);font-size:14px;font-weight:900}.tg-label{font-size:9px;color:var(--text3);margin-top:4px}
/* Compass */
.compass-wrap{display:flex;justify-content:center;padding:10px 0}
/* Fortune stick */
.stick-area{text-align:center;padding:20px 0}
.stick-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;padding:14px 32px;border-radius:var(--radius);font-size:15px;font-weight:900;font-family:var(--font-display);cursor:pointer;box-shadow:0 4px 20px rgba(240,180,41,.25);transition:all .3s;position:relative;overflow:hidden}
.stick-btn:active{transform:scale(.95)}
.stick-btn.shaking{animation:shake .5s ease}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
.stick-result{margin-top:20px;opacity:0;transform:translateY(10px);transition:all .5s ease}.stick-result.show{opacity:1;transform:none}
/* Badges & misc */
.badge{display:inline-block;font-size:10px;padding:3px 9px;border-radius:6px;font-weight:600;margin:2px}
.b-chong{background:var(--red-bg);color:var(--red)}.b-he{background:var(--green-bg);color:var(--green)}.b-xing{background:var(--orange-bg);color:var(--orange)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--card-border);border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:78vh;overflow-y:auto;animation:slideUp .3s ease;padding-bottom:env(safe-area-inset-bottom,0)}

t2)}

function isGH(a,b){return GHP.some(function(p){return(p[0]===a&&p[1]===b)||(p[0]===b&&p[1]===a)})}
function yGZ(y){return{g:TG[(y-4)%10],z:DZ[(y-4)%12]}}
function mGZ(y,m){var mz={2:"寅",3:"卯",4:"辰",5:"巳",6:"午",7:"未",8:"申",9:"酉",10:"戌",11:"亥",12:"子",1:"丑"};var z=mz[m];var yi=TG.indexOf(yGZ(y).g);var sm=[2,4,6,8,0,2,4,6,8,0];var lm=m>=2?m-1:12;return{g:TG[(sm[yi]+lm-1)%10],z:z}}
function dGZ(dt){var b=Date.UTC(2000,0,7);var t=Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate());var d=Math.floor((t-b)/864e5);return{g:TG[((d%10)+10)%10],z:DZ[((d%12)+12)%12]}}
function hGZ(dg,h){var hm=[[23,1,0],[1,3,1],[3,5,2],[5,7,3],[7,9,4],[9,11,5],[11,13,6],[13,15,7],[15,17,8],[17,19,9],[19,21,10],[21,23,11]];var zi=0;for(var i=0;i<hm.length;i++){var s=hm[i][0],e=hm[i][1],idx=hm[i][2];if(s>e?(h>=s||h<e):(h>=s&&h<e)){zi=idx;break}}var di=TG.indexOf(dg);var sm=[0,2,4,6,8,0,2,4,6,8];return{g:TG[(sm[di]+zi)%10],z:DZ[zi]}}
function getGZ(dt){var y=dt.getFullYear(),m=dt.getMonth()+1;if(m===1||(m===2&&dt.getDate()<4))y--;return{year:yGZ(y),month:mGZ(y,dt.getMonth()+1),day:dGZ(dt),hour:hGZ(dGZ(dt).g,dt.getHours())}}
function wxS(w){return{火:85,土:80,金:78,水:40,木:35}[w]||50}
function pBase(g,z){var gs=wxS(GW[g]),zs=wxS(ZW[z]),cg=ZC[z]||[];var ca=cg.length?cg.reduce(function(a,c){return a+wxS(GW[c])},0)/cg.length:50;return gs*.45+zs*.4+ca*.15}
function sP(g,z){var nz=["丑","子","申","卯"],ng=["乙","戊","甲","丁"];var base=pBase(g,z),ga=0;var i;for(i=0;i<ng.length;i++)if(isGH(g,ng[i]))ga+=FAV.has(GW[g])?5:-3;var cc=[],cn=0;for(i=0;i<nz.length;i++)if(isC(z,nz[i])){cn++;cc.push(z+"沖"+nz[i])}var xc=[],xn=0;for(var xi=0;xi<SX.length;xi++){var xs=SX[xi];if(xs.indexOf(z)>=0)for(i=0;i<nz.length;i++)if(xs.indexOf(nz[i])>=0&&nz[i]!==z){xn++;xc.push(z+"刑"+nz[i])}}var tp=Math.min(Math.min(cn*8,12)+Math.min(xn*5,12),12);var hc=[],hn=0;for(i=0;i<nz.length;i++)if(isH(z,nz[i])){hn++;hc.push(z+"合"+nz[i])}var hb=Math.min(hn*8,8);var f=Math.max(30,Math.min(100,base+ga-tp+hb));return{score:Math.round(f*10)/10,chong:cc,xing:xc,he:hc,penalty:-tp,bonus:hb,base:Math.round(base*10)/10}}
var WT={year:.1,month:.3,day:.35,hour:.25};
function calc(dt){var gz=getGZ(dt);var ps={},ds={};var pillars=["year","month","day","hour"];for(var pi=0;pi<pillars.length;pi++){var p=pillars[pi];var r=sP(gz[p].g,gz[p].z);ps[p]=r.score;ds[p]=r}var c=0;for(var k in WT)c+=ps[k]*WT[k];c=Math.max(30,Math.min(100,Math.round(c*10)/10));var ac=[],ah=[],ax=[];for(pi=0;pi<pillars.length;pi++){p=pillars[pi];ac=ac.concat(ds[p].chong);ah=ah.concat(ds[p].he);ax=ax.concat(ds[p].xing)}var sp=[];if(ac.length)sp.push({t:"六沖",d:Array.from(new Set(ac))});if(ah.length)sp.push({t:"六合",d:Array.from(new Set(ah))});if(ax.length)sp.push({t:"三刑",d:Array.from(new Set(ax))});return{gz:gz,ps:ps,ds:ds,comp:c,sp:sp,cats:catS(c,gz),star:toS(c)}}
function catS(c,gz){var dw=GW[gz.day.g],hw=GW[gz.hour.g];var w=c,ca=c,h=c,l=c,s=c;if(dw==="土"||hw==="土")w+=5;else if(dw==="水")w-=5;if(dw==="金"||hw==="金")ca+=5;else if(dw==="木")ca-=3;if(dw==="火")h+=5;else if(dw==="水")h-=5;if(dw==="火"||dw==="土")l+=4;else if(dw==="水")l-=4;var hg=gz.hour.g;if(hg==="己"||hg==="庚")s+=8;else if(hg==="壬"||hg==="癸")s-=6;if(dw==="土")s+=3;var cl=function(v){return Math.max(30,Math.min(100,Math.round(v)))};return{"財運":cl(w),"事業":cl(ca),"健康":cl(h),"感情":cl(l),"偏財":cl(s)}}

function getBaziWarnings(f){
  var gz=f.gz,c=f.cats,w=[],dayG=gz.day.g,hourG=gz.hour.g,fire=(dayG==="丙"||dayG==="丁"||hourG==="丙"||hourG==="丁");

  var strongSignal=(fire||wealth||hasSpecial(f,"六合")),unstable=(hasSpecial(f,"六沖")||hasSpecial(f,"三刑")||c["偏財"]>=70||f.comp<60);
  if(strongSignal&&unstable)w.push("旺象不可直接等於行動：先看沖刑、風險與部位，再決定要不要動。");
  if(fire)w.push("見丙丁火：適合開口、提案、啟動，不代表可以衝動決策、加碼或硬碰硬。");
  if(wealth)w.push("財星被引動：適合談資源與盤點現金流，不等於今天一定能賺。");
  if(hasSpecial(f,"六沖"))w.push("有六沖：事情容易變動，先備案，不宜把話說死。");
  if(hasSpecial(f,"三刑"))w.push("有三刑：口舌與內耗升高，重要訊息先降溫再送。");
  if(c["偏財"]>=70)w.push("偏財分高：只代表狀態較活，不是下注或重倉理由。");
  if(!w.length)w.push("今日無強烈誤判訊號；照計畫執行，仍保留停損與現實檢查。");
  return w
}

function generateAnswer(q,f){

    xu+=" ⚠️ 命理不鼓勵賭博，僅供狀態參考。";
  }else if(/談判|客戶|合約|通路/.test(q)){
    if(cats["財運"]>=65&&cats["事業"]>=65){xu=dayG+dayZ+"日，財星與官星都算配合。談判有底氣，可以稍微強勢一點。";chen="今天財運"+cats["財運"]+"、事業"+cats["事業"]+"，兩項都不差。Key Account 的條件談判可以推進，你的邏輯會很清晰。"}
    else{xu="今天"+(cats["財運"]<60?"財星偏弱":"事業星不夠力")+"，談判上容易讓步太多。建議延後關鍵條件的討論。";chen="不急在今天。把資料準備好，等運勢更好的日子再出手。通路業務最重要的是長期關係，不差這一天。"}
  }else if(/桃花|感情|約會|相親|對象/.test(q)){
    if(cats["感情"]>=70){xu="今日感情宮活躍，人際魅力提升。出去走走、主動社交，會有好的互動。";chen="感情分"+cats["感情"]+"，星盤上桃花星有動靜。穿得好看一點，今天值得去認識新朋友。"}

  }

}

    // Stars
    for(var i=0;i<particles.length;i++){var p=particles[i];p.x+=p.dx;p.y+=p.dy;
      if(p.y>h){p.y=0;p.x=Math.random()*w}if(p.x<0)p.x=w;if(p.x>w)p.x=0;
      var twinkle=p.o+Math.sin(t/1000+p.phase)*.15;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba(240,210,160,"+twinkle+")";ctx.fill()}
    // Shooting stars
    if(t-shootTimer>6000&&Math.random()<.02){shoots.push({x:Math.random()*w*.6,y:0,vx:3+Math.random()*2,vy:2+Math.random()*2,life:1});shootTimer=t}
    for(i=shoots.length-1;i>=0;i--){var s=shoots[i];s.x+=s.vx;s.y+=s.vy;s.life-=.015;
      if(s.life<=0){shoots.splice(i,1);continue}
      ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*8,s.y-s.vy*8);
      var g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*8,s.y-s.vy*8);
      g.addColorStop(0,"rgba(240,210,160,"+s.life+")");g.addColorStop(1,"rgba(240,210,160,0)");
      ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke()}
    requestAnimationFrame(frame)
  }
  requestAnimationFrame(frame)
}
